<svg width="320" height="620" viewBox="0 0 320 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Phone shell -->
  <rect width="320" height="620" rx="36" fill="#1A1A1A"/>
  <rect x="6" y="6" width="308" height="608" rx="31" fill="#1C1C1E"/>

  <!-- Status bar -->
  <rect x="6" y="6" width="308" height="34" rx="31" fill="#1C1C1E"/>
  <rect x="6" y="28" width="308" height="12" fill="#1C1C1E"/>
  <text x="20" y="28" font-size="11" font-weight="700" fill="white">9:41</text>
  <text x="270" y="28" font-size="11" font-weight="700" fill="white">100%</text>

  <!-- App bar -->
  <rect x="6" y="38" width="308" height="52" fill="#1C1C1E"/>
  <text x="20" y="57" font-size="14" fill="white">←</text>
  <text x="40" y="60" font-size="18">🇺🇸</text>
  <text x="62" y="60" font-size="12" fill="white">→</text>
  <text x="78" y="60" font-size="18">🇪🇺</text>
  <text x="104" y="60" font-size="15" font-weight="700" fill="white">USD/EUR</text>
  <line x1="6" y1="90" x2="314" y2="90" stroke="#3A3A3C" stroke-width="1"/>

  <!-- Rate hero card -->
  <rect x="14" y="98" width="292" height="110" rx="14" fill="#2C2C2E" stroke="#3A3A3C" stroke-width="1"/>
  <text x="28" y="120" font-size="12" fill="#888">1 USD =</text>
  <text x="28" y="150" font-size="34" font-weight="700" fill="white">0.9234</text>
  <text x="182" y="146" font-size="16" font-weight="500" fill="#888">EUR</text>

  <!-- Min/Max chips -->
  <rect x="28" y="162" width="80" height="36" rx="8" fill="#3B1212"/>
  <text x="36" y="176" font-size="10" fill="#888">Min 7d</text>
  <text x="36" y="190" font-size="12" font-weight="600" fill="#D93025">0.9187</text>
  <rect x="118" y="162" width="80" height="36" rx="8" fill="#0D2E1A"/>
  <text x="126" y="176" font-size="10" fill="#888">Max 7d</text>
  <text x="126" y="190" font-size="12" font-weight="600" fill="#0F9D58">0.9278</text>

  <!-- Chart card -->
  <rect x="14" y="216" width="292" height="178" rx="14" fill="#2C2C2E" stroke="#3A3A3C" stroke-width="1"/>
  <text x="28" y="238" font-size="13" font-weight="600" fill="white">Price Chart</text>

  <!-- Range buttons -->
  <rect x="186" y="226" width="34" height="20" rx="6" fill="#1A73E8"/>
  <text x="203" y="240" font-size="11" font-weight="500" fill="white" text-anchor="middle">7D</text>
  <rect x="226" y="226" width="34" height="20" rx="6" fill="#3A3A3C"/>
  <text x="243" y="240" font-size="11" fill="#aaa" text-anchor="middle">14D</text>
  <rect x="266" y="226" width="36" height="20" rx="6" fill="#3A3A3C"/>
  <text x="284" y="240" font-size="11" fill="#aaa" text-anchor="middle">30D</text>

  <!-- Chart grid lines -->
  <line x1="28" y1="260" x2="298" y2="260" stroke="#3A3A3C" stroke-width="0.5"/>
  <line x1="28" y1="290" x2="298" y2="290" stroke="#3A3A3C" stroke-width="0.5"/>
  <line x1="28" y1="320" x2="298" y2="320" stroke="#3A3A3C" stroke-width="0.5"/>
  <line x1="28" y1="350" x2="298" y2="350" stroke="#3A3A3C" stroke-width="0.5"/>

  <!-- Y labels -->
  <text x="24" y="263" font-size="9" fill="#666" text-anchor="end">0.927</text>
  <text x="24" y="293" font-size="9" fill="#666" text-anchor="end">0.923</text>
  <text x="24" y="323" font-size="9" fill="#666" text-anchor="end">0.920</text>
  <text x="24" y="353" font-size="9" fill="#666" text-anchor="end">0.917</text>

  <!-- Chart line (uptrend) -->
  <defs>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F9D58" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0F9D58" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="M28,345 C50,340 70,348 95,335 C115,323 135,340 158,328 C178,316 198,332 220,320 C242,308 262,322 285,308 L285,360 L28,360 Z" fill="url(#chartGrad)"/>
  <path d="M28,345 C50,340 70,348 95,335 C115,323 135,340 158,328 C178,316 198,332 220,320 C242,308 262,322 285,308" fill="none" stroke="#0F9D58" stroke-width="2"/>
  <circle cx="285" cy="308" r="4" fill="#0F9D58"/>

  <!-- Footnote -->
  <text x="160" y="382" font-size="10" fill="#555" text-anchor="middle">Real data via currencyapi.com/v3</text>

  <!-- Quick convert card -->
  <rect x="14" y="402" width="292" height="186" rx="14" fill="#2C2C2E" stroke="#3A3A3C" stroke-width="1"/>
  <text x="28" y="424" font-size="13" font-weight="600" fill="white">Quick Convert</text>
  <line x1="28" y1="432" x2="290" y2="432" stroke="#3A3A3C" stroke-width="0.5"/>

  <!-- Convert rows -->
  <text x="28" y="452" font-size="13" fill="#aaa">$1</text>
  <text x="290" y="452" font-size="13" font-weight="600" fill="white" text-anchor="end">€0.92</text>
  <line x1="28" y1="460" x2="290" y2="460" stroke="#3A3A3C" stroke-width="0.5"/>

  <text x="28" y="478" font-size="13" fill="#aaa">$10</text>
  <text x="290" y="478" font-size="13" font-weight="600" fill="white" text-anchor="end">€9.23</text>
  <line x1="28" y1="486" x2="290" y2="486" stroke="#3A3A3C" stroke-width="0.5"/>

  <text x="28" y="504" font-size="13" fill="#aaa">$100</text>
  <text x="290" y="504" font-size="13" font-weight="600" fill="white" text-anchor="end">€92.34</text>
  <line x1="28" y1="512" x2="290" y2="512" stroke="#3A3A3C" stroke-width="0.5"/>

  <text x="28" y="530" font-size="13" fill="#aaa">$500</text>
  <text x="290" y="530" font-size="13" font-weight="600" fill="white" text-anchor="end">€461.70</text>
  <line x1="28" y1="538" x2="290" y2="538" stroke="#3A3A3C" stroke-width="0.5"/>

  <text x="28" y="556" font-size="13" fill="#aaa">$1,000</text>
  <text x="290" y="556" font-size="13" font-weight="600" fill="white" text-anchor="end">€923.40</text>
  <line x1="28" y1="564" x2="290" y2="564" stroke="#3A3A3C" stroke-width="0.5"/>

  <text x="28" y="580" font-size="13" fill="#aaa">$5,000</text>
  <text x="290" y="580" font-size="13" font-weight="600" fill="white" text-anchor="end">€4,617</text>

  <!-- Bottom bar -->
  <rect x="120" y="608" width="80" height="4" rx="2" fill="white"/>
</svg>
