<svg width="320" height="620" viewBox="0 0 320 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Phone shell -->
  <rect width="320" height="620" rx="36" fill="#1A1A1A"/>
  <rect x="6" y="6" width="308" height="608" rx="31" fill="#F8F9FA"/>

  <!-- Status bar -->
  <rect x="6" y="6" width="308" height="34" rx="31" fill="white"/>
  <rect x="6" y="28" width="308" height="12" fill="white"/>
  <text x="20" y="28" font-size="11" font-weight="700" fill="#202124">9:41</text>
  <text x="270" y="28" font-size="11" font-weight="700" fill="#202124">100%</text>

  <!-- App bar -->
  <rect x="6" y="38" width="308" height="62" fill="white"/>
  <text x="20" y="58" font-size="16" font-weight="700" fill="#202124">Exchange Rates</text>
  <text x="20" y="72" font-size="10" fill="#999">Updated 9:41 AM</text>

  <!-- Base pill -->
  <rect x="196" y="46" width="68" height="24" rx="12" fill="#E8F0FE"/>
  <text x="208" y="62" font-size="13">🇺🇸</text>
  <text x="224" y="62" font-size="12" font-weight="600" fill="#1A73E8">USD ▾</text>

  <!-- Icons -->
  <text x="274" y="63" font-size="14" fill="#555">☀</text>
  <text x="294" y="63" font-size="14" fill="#555">↻</text>

  <!-- Tabs -->
  <rect x="6" y="100" width="308" height="34" fill="white"/>
  <line x1="6" y1="134" x2="314" y2="134" stroke="#E8EAED" stroke-width="1"/>
  <text x="52" y="122" font-size="13" font-weight="600" fill="#1A73E8" text-anchor="middle">Watchlist</text>
  <line x1="6" y1="134" x2="98" y2="134" stroke="#1A73E8" stroke-width="2"/>
  <text x="214" y="122" font-size="13" fill="#888" text-anchor="middle">All Currencies</text>

  <!-- Converter card -->
  <rect x="14" y="142" width="292" height="148" rx="14" fill="white" stroke="#E8EAED" stroke-width="1"/>
  <text x="30" y="162" font-size="13">⇄</text>
  <text x="48" y="162" font-size="12" font-weight="600" fill="#202124">Currency Converter</text>

  <!-- From field -->
  <rect x="22" y="170" width="276" height="44" rx="10" fill="#F8F9FA" stroke="#E8EAED" stroke-width="1"/>
  <text x="34" y="196" font-size="20">🇺🇸</text>
  <text x="62" y="189" font-size="13" font-weight="700" fill="#202124">USD</text>
  <text x="62" y="201" font-size="10" fill="#888">From ▾</text>
  <text x="252" y="198" font-size="20" font-weight="700" fill="#202124" text-anchor="middle">1</text>

  <!-- Swap btn -->
  <circle cx="160" cy="224" r="14" fill="white" stroke="#E8EAED" stroke-width="1"/>
  <text x="160" y="229" font-size="13" fill="#1A73E8" text-anchor="middle">⇅</text>

  <!-- To field -->
  <rect x="22" y="238" width="276" height="44" rx="10" fill="#F8F9FA" stroke="#E8EAED" stroke-width="1"/>
  <text x="34" y="264" font-size="20">🇬🇧</text>
  <text x="62" y="257" font-size="13" font-weight="700" fill="#202124">GBP</text>
  <text x="62" y="269" font-size="10" fill="#888">To ▾</text>
  <text x="238" y="266" font-size="16" font-weight="700" fill="#202124" text-anchor="end">0.7891</text>

  <!-- Rate info bar -->
  <rect x="22" y="268" width="276" height="18" rx="6" fill="#E8F0FE"/>
  <text x="30" y="281" font-size="10" fill="#1A73E8">ℹ  1 USD = 0.7891 GBP</text>
  <text x="270" y="281" font-size="10" fill="#1A73E8" text-anchor="end">Refresh</text>

  <!-- Section title -->
  <text x="18" y="307" font-size="13" font-weight="600" fill="#202124">Live Rates — 1 USD</text>

  <!-- Rate rows -->
  <!-- EUR -->
  <rect x="14" y="314" width="292" height="50" rx="12" fill="white" stroke="#E8EAED" stroke-width="1"/>
  <text x="26" y="344" font-size="24">🇪🇺</text>
  <text x="58" y="336" font-size="13" font-weight="700" fill="#202124">EUR</text>
  <text x="58" y="350" font-size="11" fill="#888">Euro</text>
  <text x="290" y="335" font-size="15" font-weight="700" fill="#202124" text-anchor="end">0.9234</text>
  <text x="290" y="350" font-size="11" font-weight="500" fill="#0F9D58" text-anchor="end">▲ +0.14%</text>

  <!-- GBP -->
  <rect x="14" y="370" width="292" height="50" rx="12" fill="white" stroke="#E8EAED" stroke-width="1"/>
  <text x="26" y="400" font-size="24">🇬🇧</text>
  <text x="58" y="392" font-size="13" font-weight="700" fill="#202124">GBP</text>
  <text x="58" y="406" font-size="11" fill="#888">British Pound</text>
  <text x="290" y="391" font-size="15" font-weight="700" fill="#202124" text-anchor="end">0.7891</text>
  <text x="290" y="406" font-size="11" font-weight="500" fill="#D93025" text-anchor="end">▼ −0.08%</text>

  <!-- JPY -->
  <rect x="14" y="426" width="292" height="50" rx="12" fill="white" stroke="#E8EAED" stroke-width="1"/>
  <text x="26" y="456" font-size="24">🇯🇵</text>
  <text x="58" y="448" font-size="13" font-weight="700" fill="#202124">JPY</text>
  <text x="58" y="462" font-size="11" fill="#888">Japanese Yen</text>
  <text x="290" y="447" font-size="15" font-weight="700" fill="#202124" text-anchor="end">149.52</text>
  <text x="290" y="462" font-size="11" font-weight="500" fill="#0F9D58" text-anchor="end">▲ +0.31%</text>

  <!-- CAD -->
  <rect x="14" y="482" width="292" height="50" rx="12" fill="white" stroke="#E8EAED" stroke-width="1"/>
  <text x="26" y="512" font-size="24">🇨🇦</text>
  <text x="58" y="504" font-size="13" font-weight="700" fill="#202124">CAD</text>
  <text x="58" y="518" font-size="11" fill="#888">Canadian Dollar</text>
  <text x="290" y="503" font-size="15" font-weight="700" fill="#202124" text-anchor="end">1.3621</text>
  <text x="290" y="518" font-size="11" font-weight="500" fill="#D93025" text-anchor="end">▼ −0.05%</text>

  <!-- AUD -->
  <rect x="14" y="538" width="292" height="50" rx="12" fill="white" stroke="#E8EAED" stroke-width="1"/>
  <text x="26" y="568" font-size="24">🇦🇺</text>
  <text x="58" y="560" font-size="13" font-weight="700" fill="#202124">AUD</text>
  <text x="58" y="574" font-size="11" fill="#888">Australian Dollar</text>
  <text x="290" y="559" font-size="15" font-weight="700" fill="#202124" text-anchor="end">1.5489</text>
  <text x="290" y="574" font-size="11" font-weight="500" fill="#0F9D58" text-anchor="end">▲ +0.22%</text>

  <!-- Bottom nav indicator -->
  <rect x="120" y="608" width="80" height="4" rx="2" fill="#202124"/>
</svg>
